name: Build and deploy Next.js app to Azure

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Inject Next.js Bypass (Leaves source code untouched)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let code = fs.readFileSync('next.config.ts', 'utf8');
            code = code.replace(/(const nextConfig[^=]*=\s*\{)/, '$1 \n  experimental: { missingSuspenseWithCSRBailout: false },\n');
            fs.writeFileSync('next.config.ts', code);

      - name: Build project
        run: npm run build

      - name: Zip artifact for deployment
        run: zip release.zip ./* .next -qr

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip -q release.zip

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ai-inference-dashboard'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}

name: Build and deploy Node.js app to Azure Web App - ai-inference-dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Bypass Static Generation (Next.js 16 Fix)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const paths = ['src/app/layout.tsx', 'app/layout.tsx'];
            for (const p of paths) {
              if (fs.existsSync(p)) {
                let code = fs.readFileSync(p, 'utf8');
                fs.writeFileSync(p, "export const dynamic = 'force-dynamic';\n" + code);
                console.log('Successfully patched ' + p);
              }
            }

      - name: Build project
        run: npm run build

      - name: Zip artifact for deployment (Preserves Next.js Symlinks)
        run: zip -qq -r -y release.zip .

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ai-inference-dashboard'
          slot-name: 'Production'
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
